<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ball Run 3D Original</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #050508;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            user-select: none;
        }
        #gameContainer {
            position: relative;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
        }
        canvas {
            background: linear-gradient(to bottom, #111827, #030712);
            display: block;
            border-radius: 16px;
        }
        #scoreBoard {
            position: absolute;
            top: 25px;
            left: 20px;
            color: #fff;
            font-size: 28px;
            font-weight: 900;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
            pointer-events: none;
            z-index: 10;
        }
        #instructions {
            position: absolute;
            bottom: 40px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            letter-spacing: 1px;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="gameContainer">
        <div id="scoreBoard">SCORE: <span id="score">0</span></div>
        <div id="instructions">SWIPE LEFT / RIGHT TO RUN</div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreDisplay = document.getElementById("score");

        // Mobile Screen Size Configuration
        canvas.width = window.innerWidth > 430 ? 400 : window.innerWidth;
        canvas.height = window.innerHeight > 800 ? 700 : window.innerHeight;

        let score = 0;
        let gameOver = false;
        let gameStarted = false;
        let speed = 6;

        // 3D Ball Properties
        const ball = {
            x: canvas.width / 2,
            y: canvas.height - 160,
            radius: 16,
            color: "#ff3b30",
            targetX: canvas.width / 2
        };

        // 3D Road / Track Layout
        const road = {
            topW: 60,
            botW: 240,
            topX: canvas.width / 2,
            topY: 200,
            botY: canvas.height
        };

        // Hurdles (Rukawatein) & Diamonds
        let items = [];

        function spawnItem() {
            if (gameOver || !gameStarted) return;
            
            // 0: Left lane, 1: Center lane, 2: Right lane
            const lane = Math.floor(Math.random() * 3);
            const isObstacle = Math.random() > 0.35; // 65% Obstacles, 35% Diamonds

            items.push({
                lane: lane,
                progress: 0, // 0 (far away) to 1 (close to player)
                type: isObstacle ? "obstacle" : "diamond",
                color: isObstacle ? "#00f2fe" : "#ffd700"
            });
        }

        // Left/Right Touch and Drag Controls
        function moveBall(e) {
            if (gameOver) return;
            if (!gameStarted) gameStarted = true;

            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const rect = canvas.getBoundingClientRect();
            const relativeX = clientX - rect.left;

            // Divide road into 3 parts based on touch position
            if (relativeX < canvas.width * 0.38) {
                ball.targetX = canvas.width / 2 - 60; // Left Lane
            } else if (relativeX > canvas.width * 0.62) {
                ball.targetX = canvas.width / 2 + 60; // Right Lane
            } else {
                ball.targetX = canvas.width / 2;      // Center Lane
            }
        }

        window.addEventListener("mousemove", moveBall);
        window.addEventListener("touchmove", moveBall, { passive: false });
        
        // Tap to restart
        window.addEventListener("click", () => { if (gameOver) resetGame(); });
        window.addEventListener("touchstart", () => { if (gameOver) resetGame(); });

        function resetGame() {
            score = 0;
            scoreDisplay.innerText = score;
            gameOver = false;
            gameStarted = false;
            speed = 6;
            items = [];
            ball.x = canvas.width / 2;
            ball.targetX = canvas.width / 2;
        }

        // Logic Update Engine
        function update() {
            if (!gameStarted || gameOver) return;

            // Smooth Ball Lateral Movement
            ball.x += (ball.targetX - ball.x) * 0.25;
            speed += 0.002; // Speed slowly increases

            for (let i = items.length - 1; i >= 0; i--) {
                let it = items[i];
                it.progress += speed * 0.0025; // Move items down the road

                // Calculate current screen coordinates based on 3D perspective
                let currentY = road.topY + (road.botY - road.topY) * it.progress;
                let currentRoadWidth = road.topW + (road.botW - road.topW) * it.progress;
                let currentLeftX = road.topX - currentRoadWidth / 2;
                let laneWidth = currentRoadWidth / 3;
                let currentX = currentLeftX + (it.lane * laneWidth) + laneWidth / 2;

                // Collision Check (When item reaches close to ball Y)
                if (it.progress >= 0.82 && it.progress <= 0.92) {
                    let distance = Math.abs(ball.x - currentX);
                    if (distance < ball.radius + (12 * it.progress)) {
                        if (it.type === "obstacle") {
                            gameOver = true;
                        } else {
                            // Collected Diamond
                            score += 10;
                            scoreDisplay.innerText = score;
                            items.splice(i, 1);
                            continue;
                        }
                    }
                }

                // Remove out of bound items
                if (it.progress > 1.0) {
                    if (it.type === "obstacle") score += 1; // Dodge point
                    scoreDisplay.innerText = score;
                    items.splice(i, 1);
                }
            }
        }

        // Render Frame
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Draw 3D Perspective Road
            ctx.fillStyle = "#1f2937";
            ctx.beginPath();
            ctx.moveTo(road.topX - road.topW / 2, road.topY);
            ctx.lineTo(road.topX + road.topW / 2, road.topY);
            ctx.lineTo(road.topX + road.botW / 2, road.botY);
            ctx.lineTo(road.topX - road.botW / 2, road.botY);
            ctx.closePath();
            ctx.fill();

            // 3D Lane Dividers lines
            ctx.strokeStyle = "rgba(255, 255, 255, 0.15)";
            ctx.lineWidth = 2;
            for (let l = 1; l <= 2; l++) {
                ctx.beginPath();
                ctx.moveTo(road.topX - road.topW / 2 + (road.topW / 3) * l, road.topY);
                ctx.lineTo(road.topX - road.botW / 2 + (road.botW / 3) * l, road.botY);
                ctx.stroke();
            }

            // Side Glowing Rails
            ctx.strokeStyle = "#ff007f";
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(road.topX - road.topW / 2, road.topY);
            ctx.lineTo(road.topX - road.botW / 2, road.botY);
            ctx.moveTo(road.topX + road.topW / 2, road.topY);
            ctx.lineTo(road.topX + road.botW / 2, road.botY);
            ctx.stroke();

            // 2. Draw Obstacles & Diamonds with 3D Scaling
            items.forEach(it => {
                let currentY = road.topY + (road.botY - road.topY) * it.progress;
                let currentRoadWidth = road.topW + (road.botW - road.topW) * it.progress;
                let currentLeftX = road.topX - currentRoadWidth / 2;
                let laneWidth = currentRoadWidth / 3;
                let currentX = currentLeftX + (it.lane * laneWidth) + laneWidth / 2;
                
                let size = 10 * (it.progress * 2); // Scales up as it gets closer

                ctx.save();
                ctx.shadowBlur = 15;
                ctx.shadowColor = it.color;
                ctx.fillStyle = it.color;

                if (it.type === "obstacle") {
                    // Draw 3D-like Hazard block
                    ctx.fillRect(currentX - size/2, currentY - size, size, size);
                } else {
                    // Draw Crystal/Diamond
                    ctx.beginPath();
                    ctx.moveTo(currentX, currentY - size);
                    ctx.lineTo(currentX + size/2, currentY - size/2);
                    ctx.lineTo(currentX, currentY);
                    ctx.lineTo(currentX - size/2, currentY - size/2);
                    ctx.closePath();
                    ctx.fill();
                }
                ctx.restore();
            });

            // 3. Draw Player 3D Rolling Ball
            ctx.save();
            let gradient = ctx.createRadialGradient(ball.x - 5, ball.y - 5, 2, ball.x, ball.y, ball.radius);
            gradient.addColorStop(0, '#ff938a');
            gradient.addColorStop(0.8, ball.color);
            gradient.addColorStop(1, '#990000');
            
            ctx.shadowBlur = 20;
            ctx.shadowColor = ball.color;
            ctx.fillStyle = gradient;
            
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // 4. Game Screen States
            if (!gameStarted && !gameOver) {
                ctx.fillStyle = "rgba(0,0,0,0.5)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#fff";
                ctx.font = "bold 20px Arial";
                ctx.textAlign = "center";
                ctx.fillText("TOUCH / MOVE TO START RUN", canvas.width / 2, canvas.height / 2);
            }

            if (gameOver) {
                ctx.fillStyle = "rgba(5, 5, 8, 0.85)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#ff2a5f";
                ctx.font = "bold 36px Arial";
                ctx.textAlign = "center";
                ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 20);
                ctx.fillStyle = "#fff";
                ctx.font = "bold 16px Arial";
                ctx.fillText("Tap anywhere to Restart", canvas.width / 2, canvas.height / 2 + 25);
            }
        }

        // Loop Runner
        let spawnTimer = 0;
        function loop() {
            update();
            draw();

            spawnTimer++;
            if (spawnTimer > 35) { // Controls item spawn rate
                spawnItem();
                spawnTimer = 0;
            }
            requestAnimationFrame(loop);
        }

        resetGame();
        loop();
    </script>
</body>
</html>
