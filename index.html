<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Dunk Real Match</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #121214;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            user-select: none;
        }
        #gameContainer {
            position: relative;
            box-shadow: 0 12px 40px rgba(0,0,0,0.7);
        }
        canvas {
            background: linear-gradient(to bottom, #2c3e50, #000000);
            display: block;
            border-radius: 12px;
        }
        #scoreBoard {
            position: absolute;
            top: 40px;
            width: 100%;
            text-align: center;
            color: #fff;
            font-size: 65px;
            font-weight: 900;
            text-shadow: 3px 3px 0px #ff4500;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="gameContainer">
        <div id="scoreBoard">0</div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreBoard = document.getElementById("scoreBoard");

        // Mobile Responsive Setup
        canvas.width = window.innerWidth > 430 ? 400 : window.innerWidth;
        canvas.height = window.innerHeight > 800 ? 700 : window.innerHeight;

        let score = 0;
        let gameOver = false;
        let gameStarted = false;

        // Ball with Trail and Wings
        const ball = {
            x: canvas.width * 0.28,
            y: canvas.height / 2,
            radius: 14,
            gravity: 0.34,
            lift: -6.4,
            velocity: 0,
            trail: [],
            wingAngle: 0
        };

        // Rings/Hoops List
        let rings = [];
        const ringWidth = 75;

        function spawnRing(first = false) {
            let xPosition = first ? canvas.width * 0.75 : canvas.width + 120;
            let minY = 180;
            let maxY = canvas.height - 180;
            let yPosition = Math.floor(Math.random() * (maxY - minY)) + minY;
            
            rings.push({
                x: xPosition,
                y: yPosition,
                passed: false,
                tilt: (Math.random() * 30 - 15) * Math.PI / 180 // Real Tilt Angle
            });
        }

        function bounce() {
            if (gameOver) {
                resetGame();
                return;
            }
            if (!gameStarted) gameStarted = true;
            ball.velocity = ball.lift;
        }

        // Controls
        window.addEventListener("keydown", (e) => { if (e.code === "Space") bounce(); });
        canvas.addEventListener("touchstart", (e) => { e.preventDefault(); bounce(); }, {passive: false});
        canvas.addEventListener("mousedown", bounce);

        function resetGame() {
            ball.y = canvas.height / 2;
            ball.velocity = 0;
            ball.trail = [];
            rings = [];
            score = 0;
            scoreBoard.innerText = score;
            gameOver = false;
            gameStarted = false;
            
            spawnRing(true);
            spawnRing();
        }

        function update() {
            if (!gameStarted || gameOver) return;

            ball.velocity += ball.gravity;
            ball.y += ball.velocity;
            ball.wingAngle += 0.28;

            // Trail positions
            ball.trail.push({ x: ball.x, y: ball.y });
            if (ball.trail.length > 12) ball.trail.shift();

            // Floor and Roof crash
            if (ball.y + ball.radius >= canvas.height || ball.y - ball.radius <= 0) {
                gameOver = true;
            }

            // Ring logic
            let currentSpeed = 2.5 + (score * 0.05);
            for (let i = rings.length - 1; i >= 0; i--) {
                rings[i].x -= currentSpeed;

                let r = rings[i];
                let rLeft = r.x - ringWidth / 2;
                let rRight = r.x + ringWidth / 2;

                // Accurate center dunk detection
                if (!r.passed && ball.x > rLeft && ball.x < rRight) {
                    if (Math.abs(ball.y - r.y) < 12) {
                        r.passed = true;
                        score++;
                        scoreBoard.innerText = score;
                    }
                }

                // Missed ring check
                if (!r.passed && (r.x + ringWidth/2) < (ball.x - ball.radius)) {
                    gameOver = true;
                }

                if (r.x + ringWidth < -60) {
                    rings.splice(i, 1);
                    spawnRing();
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Neon Dot Trails
            ball.trail.forEach((t, index) => {
                ctx.beginPath();
                ctx.arc(t.x, t.y, ball.radius * (index / ball.trail.length), 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${index / 16})`;
                ctx.fill();
            });

            // Draw Rings
            rings.forEach(r => {
                ctx.save();
                ctx.translate(r.x, r.y);
                ctx.rotate(r.tilt);

                // Dotted Mesh Net
                ctx.strokeStyle = "rgba(255, 255, 255, 0.25)";
                ctx.lineWidth = 2.5;
                ctx.setLineDash([4, 4]);
                ctx.beginPath();
                ctx.moveTo(-ringWidth / 2 + 6, 0);
                ctx.lineTo(-ringWidth / 3, 42);
                ctx.lineTo(ringWidth / 3, 42);
                ctx.lineTo(ringWidth / 2 - 6, 0);
                ctx.stroke();
                ctx.setLineDash([]);

                // Glowing Neon Rim Hoop
                ctx.strokeStyle = "#ff4e00";
                ctx.lineWidth = 7.5;
                ctx.lineCap = "round";
                ctx.beginPath();
                ctx.moveTo(-ringWidth / 2, 0);
                ctx.lineTo(ringWidth / 2, 0);
                ctx.stroke();

                ctx.restore();
            });

            // Draw Basketball with Shading & Wings
            ctx.save();
            ctx.translate(ball.x, ball.y);

            // Flapping Wings
            ctx.fillStyle = "#ffffff";
            ctx.strokeStyle = "#000000";
            ctx.lineWidth = 2;
            ctx.save();
            ctx.translate(-12, -4);
            ctx.rotate(-Math.sin(ball.wingAngle) * 0.5 - 0.3);
            ctx.beginPath(); 
            ctx.ellipse(0, 0, 14, 6.5, 0, 0, Math.PI * 2); 
            ctx.fill(); 
            ctx.stroke();
            ctx.restore();

            // Basketball Color Shading
            let radGrad = ctx.createRadialGradient(-3, -3, 2, 0, 0, ball.radius);
            radGrad.addColorStop(0, '#ff9f43');
            radGrad.addColorStop(0.8, '#ee5a24');
            radGrad.addColorStop(1, '#9e1c00');
            ctx.fillStyle = radGrad;
            
            ctx.beginPath();
            ctx.arc(0, 0, ball.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = "#000";
            ctx.lineWidth = 2.5;
            ctx.stroke();

            // Black Lines on Ball
            ctx.strokeStyle = "rgba(0,0,0,0.6)";
            ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.arc(0, 0, ball.radius, -Math.PI/3, Math.PI/3); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(-ball.radius, 0); ctx.lineTo(ball.radius, 0); ctx.stroke();

            ctx.restore();

            // UI Screens
            if (!gameStarted && !gameOver) {
                ctx.fillStyle = "rgba(0,0,0,0.4)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#fff";
                ctx.font = "bold 22px Arial";
                ctx.textAlign = "center";
                ctx.fillText("TAP TO JUMP & DUNK", canvas.width / 2, canvas.height / 2);
            }

            if (gameOver) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.8)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#ff3333";
                ctx.font = "bold 38px Arial";
                ctx.textAlign = "center";
                ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 25);
                ctx.fillStyle = "#fff";
                ctx.font = "bold 18px Arial";
                ctx.fillText("Tap to Restart", canvas.width / 2, canvas.height / 2 + 20);
            }
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        resetGame();
        loop();
    </script>
</body>
</html>
