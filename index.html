<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ball Run 3D Big & Real</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #06060c;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            user-select: none;
        }
        #gameContainer {
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.9);
        }
        canvas {
            background: linear-gradient(to bottom, #0f172a, #020617);
            display: block;
            border-radius: 16px;
        }
        #scoreBoard {
            position: absolute;
            top: 25px;
            width: 100%;
            text-align: center;
            color: #fff;
            font-size: 32px;
            font-weight: 900;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="gameContainer">
        <div id="scoreBoard"><span id="score">0</span></div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreDisplay = document.getElementById("score");

        // Dynamic Screen Adjustment for Mobile
        canvas.width = window.innerWidth > 430 ? 420 : window.innerWidth;
        canvas.height = window.innerHeight > 800 ? 720 : window.innerHeight;

        let score = 0;
        let gameOver = false;
        let gameStarted = false;
        let speed = 7; // Thoda fast aur exciting speed

        // BIGGER BALL (Size 16 se badha kar 24 kar diya)
        const ball = {
            x: canvas.width / 2,
            y: canvas.height - 180,
            radius: 24, 
            color: "#ff3333",
            targetX: canvas.width / 2
        };

        // MUCH WIDER ROAD (BotW 240 se badha kar 340 kiya - Ekdum Choura)
        const road = {
            topW: 90,
            botW: 340, 
            topX: canvas.width / 2,
            topY: 180,
            botY: canvas.height
        };

        let items = [];

        function spawnItem() {
            if (gameOver || !gameStarted) return;
            
            const lane = Math.floor(Math.random() * 3); // 0: Left, 1: Center, 2: Right
            const isObstacle = Math.random() > 0.4; // 60% Blocks, 40% Diamonds

            items.push({
                lane: lane,
                progress: 0, 
                type: isObstacle ? "obstacle" : "diamond",
                color: isObstacle ? "#00f0ff" : "#ffd700"
            });
        }

        // Smooth Touch / Drag Controls
        function moveBall(e) {
            if (gameOver) return;
            if (!gameStarted) gameStarted = true;

            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const rect = canvas.getBoundingClientRect();
            const relativeX = clientX - rect.left;

            // Wide road ke hisab se lane positioning
            if (relativeX < canvas.width * 0.35) {
                ball.targetX = canvas.width / 2 - 95; // Left Lane
            } else if (relativeX > canvas.width * 0.65) {
                ball.targetX = canvas.width / 2 + 95; // Right Lane
            } else {
                ball.targetX = canvas.width / 2;      // Center Lane
            }
        }

        window.addEventListener("mousemove", moveBall);
        window.addEventListener("touchmove", moveBall, { passive: false });
        
        window.addEventListener("click", () => { if (gameOver) resetGame(); });
        window.addEventListener("touchstart", () => { if (gameOver) resetGame(); });

        function resetGame() {
            score = 0;
            scoreDisplay.innerText = score;
            gameOver = false;
            gameStarted = false;
            speed = 7;
            items = [];
            ball.x = canvas.width / 2;
            ball.targetX = canvas.width / 2;
        }

        function update() {
            if (!gameStarted || gameOver) return;

            // Smooth Lateral Slide
            ball.x += (ball.targetX - ball.x) * 0.28;
            speed += 0.003; 

            for (let i = items.length - 1; i >= 0; i--) {
                let it = items[i];
                it.progress += speed * 0.0024; 

                let currentY = road.topY + (road.botY - road.topY) * it.progress;
                let currentRoadWidth = road.topW + (road.botW - road.topW) * it.progress;
                let currentLeftX = road.topX - currentRoadWidth / 2;
                let laneWidth = currentRoadWidth / 3;
                let currentX = currentLeftX + (it.lane * laneWidth) + laneWidth / 2;

                // Accurate Collision with Larger Hitbox
                if (it.progress >= 0.78 && it.progress <= 0.92) {
                    let distance = Math.abs(ball.x - currentX);
                    let itemSize = 14 * (it.progress * 2.8);
                    
                    if (distance < ball.radius + (itemSize / 2)) {
                        if (it.type === "obstacle") {
                            gameOver = true;
                        } else {
                            score += 10;
                            scoreDisplay.innerText = score;
                            items.splice(i, 1);
                            continue;
                        }
                    }
                }

                if (it.progress > 1.0) {
                    if (it.type === "obstacle") score += 1; 
                    scoreDisplay.innerText = score;
                    items.splice(i, 1);
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. CHOURI ROAD
            ctx.fillStyle = "#1e293b";
            ctx.beginPath();
            ctx.moveTo(road.topX - road.topW / 2, road.topY);
            ctx.lineTo(road.topX + road.topW / 2, road.topY);
            ctx.lineTo(road.topX + road.botW / 2, road.botY);
            ctx.lineTo(road.topX - road.botW / 2, road.botY);
            ctx.closePath();
            ctx.fill();

            // 3D Lane Lines
            ctx.strokeStyle = "rgba(255, 255, 255, 0.18)";
            ctx.lineWidth = 3;
            for (let l = 1; l <= 2; l++) {
                ctx.beginPath();
                ctx.moveTo(road.topX - road.topW / 2 + (road.topW / 3) * l, road.topY);
                ctx.lineTo(road.topX - road.botW / 2 + (road.botW / 3) * l, road.botY);
                ctx.stroke();
            }

            // Side Borders (Neon Cyber Look)
            ctx.strokeStyle = "#38bdf8";
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.moveTo(road.topX - road.topW / 2, road.topY);
            ctx.lineTo(road.topX - road.botW / 2, road.botY);
            ctx.moveTo(road.topX + road.topW / 2, road.topY);
            ctx.lineTo(road.topX + road.botW / 2, road.botY);
            ctx.stroke();

            // 2. BIGGER 3D OBSTACLES & GEMS
            items.forEach(it => {
                let currentY = road.topY + (road.botY - road.topY) * it.progress;
                let currentRoadWidth = road.topW + (road.botW - road.topW) * it.progress;
                let currentLeftX = road.topX - currentRoadWidth / 2;
                let laneWidth = currentRoadWidth / 3;
                let currentX = currentLeftX + (it.lane * laneWidth) + laneWidth / 2;
                
                // Bigger Scale factor (2.8)
                let size = 14 * (it.progress * 2.8); 

                ctx.save();
                ctx.shadowBlur = 15;
                ctx.shadowColor = it.color;
                ctx.fillStyle = it.color;

                if (it.type === "obstacle") {
                    // Big 3D Block Wall
                    ctx.fillRect(currentX - size/2, currentY - size, size, size);
                    ctx.strokeStyle = "#ffffff";
                    ctx.lineWidth = 1.5;
                    ctx.strokeRect(currentX - size/2, currentY - size, size, size);
                } else {
                    // Big Diamond
                    ctx.beginPath();
                    ctx.moveTo(currentX, currentY - size);
                    ctx.lineTo(currentX + size/1.6, currentY - size/2);
                    ctx.lineTo(currentX, currentY);
                    ctx.lineTo(currentX - size/1.6, currentY - size/2);
                    ctx.closePath();
                    ctx.fill();
                }
                ctx.restore();
            });

            // 3. BIGGER 3D BALL
            ctx.save();
            let gradient = ctx.createRadialGradient(ball.x - 7, ball.y - 7, 3, ball.x, ball.y, ball.radius);
            gradient.addColorStop(0, '#ff8a80');
            gradient.addColorStop(0.7, ball.color);
            gradient.addColorStop(1, '#7f0000');
            
            ctx.shadowBlur = 25;
            ctx.shadowColor = ball.color;
            ctx.fillStyle = gradient;
            
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // 4. Game Screen Text
            if (!gameStarted && !gameOver) {
                ctx.fillStyle = "rgba(0,0,0,0.6)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#fff";
                ctx.font = "bold 20px Arial";
                ctx.textAlign = "center";
                ctx.fillText("SWIPE LEFT / RIGHT TO START", canvas.width / 2, canvas.height / 2);
            }

            if (gameOver) {
                ctx.fillStyle = "rgba(2, 6, 23, 0.9)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#ef4444";
                ctx.font = "bold 38px Arial";
                ctx.textAlign = "center";
                ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 20);
                ctx.fillStyle = "#fff";
                ctx.font = "bold 18px Arial";
                ctx.fillText("Tap to Try Again", canvas.width / 2, canvas.height / 2 + 30);
            }
        }

        let spawnTimer = 0;
        function loop() {
            update();
            draw();

            spawnTimer++;
            if (spawnTimer > 32) { 
                spawnItem();
                spawnTimer = 0;
            }
            requestAnimationFrame(loop);
        }

        resetGame();
        loop();
    </script>
</body>
</html>
