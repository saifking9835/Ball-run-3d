<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Dunk Real Game</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #111;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            user-select: none;
        }
        #gameContainer {
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        canvas {
            background: linear-gradient(to bottom, #ff758c 0%, #ff7eb3 100%);
            display: block;
            border-radius: 12px;
        }
        #scoreBoard {
            position: absolute;
            top: 40px;
            width: 100%;
            text-align: center;
            color: #fff;
            font-size: 60px;
            font-weight: 900;
            text-shadow: 4px 4px 0px rgba(0, 0, 0, 0.3);
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="gameContainer">
        <div id="scoreBoard">0</div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreBoard = document.getElementById("scoreBoard");

        // Mobile Responsive Dimension
        canvas.width = window.innerWidth > 430 ? 400 : window.innerWidth;
        canvas.height = window.innerHeight > 800 ? 700 : window.innerHeight;

        let score = 0;
        let gameOver = false;
        let gameStarted = false;

        // Basketball with Wings & Trail (Poonch effect)
        const ball = {
            x: canvas.width * 0.25,
            y: canvas.height / 2,
            radius: 14,
            gravity: 0.32,
            lift: -6.2,
            velocity: 0,
            trail: [],
            wingAngle: 0
        };

        // Rings system
        let rings = [];
        const ringWidth = 70;

        function spawnRing(first = false) {
            let xPosition = first ? canvas.width * 0.7 : canvas.width + 100;
            let minY = 180;
            let maxY = canvas.height - 180;
            let yPosition = Math.floor(Math.random() * (maxY - minY)) + minY;
            
            rings.push({
                x: xPosition,
                y: yPosition,
                passed: false,
                tilt: (Math.random() * 24 - 12) * Math.PI / 180 // Dynamic angle like screenshot
            });
        }

        // Tap Mechanics
        function bounce() {
            if (gameOver) {
                resetGame();
                return;
            }
            if (!gameStarted) gameStarted = true;
            ball.velocity = ball.lift;
        }

        // Action Handlers
        window.addEventListener("keydown", (e) => { if (e.code === "Space") bounce(); });
        canvas.addEventListener("touchstart", (e) => { e.preventDefault(); bounce(); }, {passive: false});
        canvas.addEventListener("mousedown", bounce);

        function resetGame() {
            ball.y = canvas.height / 2;
            ball.velocity = 0;
            ball.trail = [];
            rings = [];
            score = 0;
            scoreBoard.innerText = score;
            gameOver = false;
