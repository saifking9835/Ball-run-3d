<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solar Run 3D Ultra Smooth</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #020205;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            user-select: none;
        }
        #gameContainer {
            position: relative;
            box-shadow: 0 25px 65px rgba(0, 242, 254, 0.25);
        }
        canvas {
            background: linear-gradient(to bottom, #070a1e, #010206);
            display: block;
            border-radius: 16px;
        }
        #scoreBoard {
            position: absolute;
            top: 25px;
            width: 100%;
            text-align: center;
            color: #fff;
            font-size: 35px;
            font-weight: 900;
            text-shadow: 0 0 12px #00f2fe;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="gameContainer">
        <div id="scoreBoard"><span id="score">0</span></div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreDisplay = document.getElementById("score");

        // Dynamic Adjustments
        canvas.width = window.innerWidth > 430 ? 420 : window.innerWidth;
        canvas.height = window.innerHeight > 800 ? 720 : window.innerHeight;

        let score = 0;
        let gameOver = false;
        let gameStarted = false;
        let speed = 7.0;
        let solarAnimationOffset = 0;

        // Big Ball with Anti-Lag Snapping
        const ball = {
            x: canvas.width / 2,
            y: canvas.height - 180,
            radius: 24, 
            color: "#ff2a5f",
            targetX: canvas.width / 2
        };

        const road = {
            topW: 100,
            botW: 350, 
            topX: canvas.width / 2,
            topY: 180,
            botY: canvas.height
        };

        let items = [];

        function spawnItem() {
            if (gameOver || !gameStarted) return;
            const lane = Math.floor(Math.random() * 3);
            const isObstacle = Math.random() > 0.45;

            items.push({
                lane: lane,
                progress: 0, 
                type: isObstacle ? "obstacle" : "diamond",
                color: isObstacle ? "#ff3333" : "#00ffcc"
            });
        }

        // Improved Smooth Touch Controls (Prevents Glitch/Freezing)
        function handleInput(clientX) {
            if (gameOver) return;
            if (!gameStarted) gameStarted = true;

            const rect = canvas.getBoundingClientRect();
            const relativeX = clientX - rect.left;

            if (relativeX < canvas.width * 0.35) {
                ball.targetX = canvas.width / 2 - 95; 
            } else if (relativeX > canvas.width * 0.65) {
                ball.targetX = canvas.width / 2 + 95; 
            } else {
                ball.targetX = canvas.width / 2;      
            }
        }

        window.addEventListener("mousemove", (e) => handleInput(e.clientX));
        window.addEventListener("touchmove", (e) => {
            if(e.touches.length > 0) {
                handleInput(e.touches[0].clientX);
            }
        }, { passive: true });

        window.addEventListener("click", () => { if (gameOver) resetGame(); });
        window.addEventListener("touchstart", () => { if (gameOver) resetGame(); }, { passive: true });

        function resetGame() {
            score = 0;
            scoreDisplay.innerText = score;
            gameOver = false;
            gameStarted = false;
            speed = 7.0;
            items = [];
            ball.x = canvas.width / 2;
            ball.targetX = canvas.width / 2;
        }

        function update() {
            if (!gameStarted || gameOver) return;

            // Smooth interpolation that prevents snapping lags
            ball.x += (ball.targetX - ball.x) * 0.30;
            if(Math.abs(ball.x - ball.targetX) < 1) ball.x = ball.targetX;

            speed += 0.002; 
            solarAnimationOffset += speed * 0.5;

            for (let i = items.length - 1; i >= 0; i--) {
                let it = items[i];
                it.progress += speed * 0.0022; 

                let currentY = road.topY + (road.botY - road.topY) * it.progress;
                let currentRoadWidth = road.topW + (road.botW - road.topW) * it.progress;
                let currentLeftX = road.topX - currentRoadWidth / 2;
                let laneWidth = currentRoadWidth / 3;
                let currentX = currentLeftX + (it.lane * laneWidth) + laneWidth / 2;

                // Fixed precise hitbox trigger
                if (it.progress >= 0.80 && it.progress <= 0.92) {
                    let distance = Math.abs(ball.x - currentX);
                    let itemSize = 14 * (it.progress * 2.8);
                    
                    if (distance < ball.radius + (itemSize / 2.2)) {
                        if (it.type === "obstacle") {
                            gameOver = true;
                        } else {
                            score += 10;
                            scoreDisplay.innerText = score;
                            items.splice(i, 1);
                            continue;
                        }
                    }
                }

                if (it.progress > 1.0) {
                    if (it.type === "obstacle") score += 1; 
                    scoreDisplay.innerText = score;
                    items.splice(i, 1);
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Solar Road Base
            ctx.fillStyle = "#0c1020"; 
            ctx.beginPath();
            ctx.moveTo(road.topX - road.topW / 2, road.topY);
            ctx.lineTo(road.topX + road.topW / 2, road.topY);
            ctx.lineTo(road.topX + road.botW / 2, road.botY);
            ctx.lineTo(road.topX - road.botW / 2, road.botY);
            ctx.closePath();
            ctx.fill();

            // Solar Lines
            ctx.strokeStyle = "#00f2fe"; 
            ctx.lineWidth = 1.5;
            for (let y = road.topY; y < road.botY; y += 35) {
                let movingY = y + (solarAnimationOffset % 35);
                if (movingY > road.botY) continue;
                
                let p = (movingY - road.topY) / (road.botY - road.topY);
                let currentW = road.topW + (road.botW - road.topW) * p;
                
                ctx.beginPath();
                ctx.moveTo(road.topX - currentW / 2, movingY);
                ctx.lineTo(road.topX + currentW / 2, movingY);
                ctx.stroke();
            }

            // Lane Borders
            ctx.lineWidth = 3;
            for (let l = 1; l <= 2; l++) {
                ctx.beginPath();
                ctx.moveTo(road.topX - road.topW / 2 + (road.topW / 3) * l, road.topY);
                ctx.lineTo(road.topX - road.botW / 2 + (road.botW / 3) * l, road.botY);
                ctx.stroke();
            }

            // Outer Neon Frame
            ctx.strokeStyle = "#00f2fe";
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.moveTo(road.topX - road.topW / 2, road.topY);
            ctx.lineTo(road.topX - road.botW / 2, road.botY);
            ctx.moveTo(road.topX + road.topW / 2, road.topY);
            ctx.lineTo(road.topX + road.botW / 2, road.botY);
            ctx.stroke();

            // Render Items
            items.forEach(it => {
                let currentY = road.topY + (road.botY - road.topY) * it.progress;
                let currentRoadWidth = road.topW + (road.botW - road.topW) * it.progress;
                let currentLeftX = road.topX - currentRoadWidth / 2;
                let laneWidth = currentRoadWidth / 3;
                let currentX = currentLeftX + (it.lane * laneWidth) + laneWidth / 2;
                
                let size = 15 * (it.progress * 2.8); 

                ctx.save();
                ctx.fillStyle = it.color;

                if (it.type === "obstacle") {
                    ctx.fillRect(currentX - size/2, currentY - size, size, size);
                    ctx.strokeStyle = "#fff";
                    ctx.lineWidth = 2;
                    ctx.strokeRect(currentX - size/2, currentY - size, size, size);
                } else {
                    ctx.beginPath();
                    ctx.moveTo(currentX, currentY - size);
                    ctx.lineTo(currentX + size/1.5, currentY - size/2);
                    ctx.lineTo(currentX, currentY);
                    ctx.lineTo(currentX - size/1.5, currentY - size/2);
                    ctx.closePath();
                    ctx.fill();
                }
                ctx.restore();
            });

            // Player Ball
            ctx.save();
            let gradient = ctx.createRadialGradient(ball.x - 7, ball.y - 7, 3, ball.x, ball.y, ball.radius);
            gradient.addColorStop(0, '#fff');
            gradient.addColorStop(0.5, ball.color);
            gradient.addColorStop(1, '#66001f');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // UI Overlays
            if (!gameStarted && !gameOver) {
                ctx.fillStyle = "rgba(0,0,0,0.7)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#00f2fe";
                ctx.font = "bold 20px Arial";
                ctx.textAlign = "center";
                ctx.fillText("SWIPE TO RUN ON SOLAR GRID", canvas.width / 2, canvas.height / 2);
            }

            if (gameOver) {
                ctx.fillStyle = "rgba(2, 4, 15, 0.92)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#ff2a5f";
                ctx.font = "bold 38px Arial";
                ctx.textAlign = "center";
                ctx.fillText("SYSTEM CRASH", canvas.width / 2, canvas.height / 2 - 20);
                ctx.fillStyle = "#fff";
                ctx.font = "bold 18px Arial";
                ctx.fillText("Tap to Reboot", canvas.width / 2, canvas.height / 2 + 30);
            }
        }

        let spawnTimer = 0;
        function loop() {
            update();
            draw();

            spawnTimer++;
            if (spawnTimer > 34) { 
                spawnItem();
                spawnTimer = 0;
            }
            requestAnimationFrame(loop);
        }

        resetGame();
        loop();
    </script>
</body>
</html>
